name: Release docker image
on:
  push:
    tags:
      - v**

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: public.ecr.aws/l9h3g6c6/evm-gateway
  AWS_REGION: us-east-1

jobs:
  amd64-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 60
    steps:
      - name: Checkout evm-gateway
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::981432137740:role/evm-gateway
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build
        run: |
          TAG="${{ github.ref_name }}"
          VERSION_PKG=github.com/InjectiveLabs/evm-gateway/version
          VERSION_FLAGS="-X ${VERSION_PKG}.AppVersion=${TAG} -X ${VERSION_PKG}.GitCommit=$(git rev-parse --short HEAD) -X ${VERSION_PKG}.BuildDate=$(date -u +%Y%m%d-%H%M)"
          docker buildx build \
            --build-arg VERSION_FLAGS="${VERSION_FLAGS}" \
            --tag $ECR_REPO:$TAG \
            --platform linux/amd64 \
            --push .
